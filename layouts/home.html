{{ define "main" }}
  {{ partial "hero.html" . }}

  {{ $latest := first 4 (sort site.RegularPages "Date" "desc") }}
  {{ if $latest }}
    <section>
      <h2 class="section-title">{{ i18n "latest_posts" }}</h2>
      <div class="post-grid">
        {{ range $latest }}
          {{ partial "post-card.html" . }}
        {{ end }}
      </div>
    </section>
  {{ else }}
    <p class="empty-state">{{ i18n "no_posts" }}</p>
  {{ end }}
{{ end }}
