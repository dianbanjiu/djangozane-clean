<div class="container">
  <div class="site-title" id="site-title">
    <span class="site-title-brand"><a href="{{ "/" | relURL }}">{{ site.Title }}</a></span>
    <span class="site-title-article" id="site-title-article" aria-hidden="true"></span>
  </div>
  <div class="header-right">
    {{ partial "menu.html" (dict "menuID" "main" "page" . "search" site.Params.search.enabled) }}
    <button class="menu-toggle" id="menu-toggle" aria-label="{{ i18n "toggle_menu" }}" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    {{- if site.Params.search.enabled }}
      <a class="search-toggle search-toggle-inline" href="{{ "search" | relURL }}" aria-label="{{ i18n "search" }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>
    {{- end }}
    <button class="theme-toggle" id="theme-toggle" aria-label="{{ i18n "toggle_theme" }}">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</div>
