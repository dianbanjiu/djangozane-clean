{{- $pag := .Paginator -}}
{{- if gt $pag.TotalPages 1 -}}
  <nav class="pagination" aria-label="pagination">
    {{- if $pag.HasPrev -}}
      <a class="pagination-link pagination-prev" href="{{ $pag.Prev.URL }}">← Prev</a>
    {{- else -}}
      <span class="pagination-link pagination-prev disabled">← Prev</span>
    {{- end -}}

    <span class="pagination-info">{{ $pag.PageNumber }} / {{ $pag.TotalPages }}</span>

    {{- if $pag.HasNext -}}
      <a class="pagination-link pagination-next" href="{{ $pag.Next.URL }}">Next →</a>
    {{- else -}}
      <span class="pagination-link pagination-next disabled">Next →</span>
    {{- end -}}
  </nav>
{{- end -}}
